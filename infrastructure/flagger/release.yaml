apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: flagger
  namespace: flagger-system

spec:
  interval: 5m

  chart:
    spec:
      chart: flagger
      version: "1.37.0"

      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flux-system

  values:
    meshProvider: nginx
    metricsServer: http://kube-prometheus-stack-prometheus.monitoring:9090