apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system

spec:
  interval: 5m
  path: ./infrastructure/metallb/config

  prune: true

  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn:
    - name: infrastructure

  wait: true