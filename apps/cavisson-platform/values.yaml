# Default values for cavisson-platform (tenant deployment)
# This is a YAML-formatted file.

# Tenant configuration
tenantId: "tenant2"

# Base domain used to derive per-tenant hostnames:
#   UI (Portal):        ui.<tenantId>.<baseDomain>   → controller port 4444
#   Data collection:    data.<tenantId>.<baseDomain>  → controller port 443
baseDomain: "cav-test.com"

# Controller configuration
controller:
  enabled: true
  replicaCount: 1
  image:
    repository: cavissonsystem/cav-test-controller
    tag: 4.16.0.B1
    pullPolicy: IfNotPresent
  # Init container configuration for database setup
  initContainer:
    image:
      repository: mongodb/mongodb-community-server
      tag: "8.0-ubuntu2204"
      pullPolicy: IfNotPresent
  # MongoDB application user credentials (used in nosqlConfiguration.properties)
  mongodb:
    appUser: "cavisson"
    appPassword: "Cavisson!"
  service:
    type: ClusterIP
    port: 8080
    nodePort: 30080
    dataPort: 443   # data collection service (HTTPS)
    uiPort: 4444    # UI / Portal service (HTTPS)
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 8Gi
  env: []

# PostgreSQL configuration
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "17.2-alpine3.20"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  # Database credentials
  user: "cavisson"
  password: "cavisson"
  database: "cavisson"
  persistence:
    enabled: true
    storageClass: managed-csi
    accessMode: ReadWriteOnce
    size: 50Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  # Environment variables for PostgreSQL container
  env:
    - name: POSTGRES_DB
      value: "cavisson"
    - name: POSTGRES_USER
      value: "cavisson"
    - name: POSTGRES_PASSWORD
      value: "cavisson"
    - name: PGDATA                               # ← add this line
      value: /var/lib/postgresql/data/pgdata # ← add this line

# MongoDB configuration
mongo:
  enabled: true
  image:
    repository: mongodb/mongodb-community-server
    tag: "8.0-ubuntu2204"
    pullPolicy: IfNotPresent
  service:
    port: 27017
  # MongoDB root credentials
  rootUser: "admin"
  rootPassword: "admin"
  persistence:
    enabled: true
    storageClass: managed-csi
    accessMode: ReadWriteOnce
    size: 50Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  # Environment variables for MongoDB container
  env:
    - name: MONGODB_INITDB_ROOT_USERNAME
      value: "admin"
    - name: MONGODB_INITDB_ROOT_PASSWORD
      value: "admin"

# Redis configuration
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.0.15-alpine3.20"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  # Redis password (leave empty for no authentication)
  password: ""
  persistence:
    enabled: false
    storageClass: managed-csi
    accessMode: ReadWriteOnce
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Persistent Volume configuration
persistence:
  # Primary PVC for shared data
  primary:
    enabled: true
    storageClass: managed-csi
    accessMode: ReadWriteOnce #ReadWriteMany
    size: 100Gi
    name: "cavisson-pvc-primary"
  
  # Secondary PVC for additional test run data (optional)
  secondary:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteMany
    size: 100Gi
    name: "cavisson-pvc-secondary"

# Operator configuration
# These settings will be read by the cavisson-operator
operator:
  # Docker images for operator-managed pods
  images:
    executionController: "cavissonsystem/cav-k8s-exec-controller:latest"
    generator: "cavissonsystem/cav-k8s-exec-generator:latest"
  
  # PVC name to use for operator-managed pods
  pvcName: "cavisson-pvc-primary"
  
  # Image pull policy for operator-managed pods
  imagePullPolicy: "IfNotPresent"

# Ingress configuration.
# Both services are exposed on standard HTTPS port 443 using host-based routing:
#   UI (Portal):     ui.<tenantId>.<baseDomain>   → controller port 4444
#   Data collection: data.<tenantId>.<baseDomain>  → controller port 443
# NGINX terminates external TLS and re-encrypts to the HTTPS backend (backend-protocol: HTTPS).
ingress:
  enabled: true
  className: "nginx"

  # Annotations applied to BOTH the UI and data Ingress resources.
  # backend-protocol: HTTPS  — NGINX re-encrypts when forwarding to the controller.
  # proxy-ssl-verify: "off"  — skips verification of the controller's self-signed cert.
  # affinity cookie          — ensures all requests in a session hit the same pod.
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "cavisson-session"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"

  # TLS configuration for externally visible certificates.
  tls:
    enabled: true
    # cert-manager: annotates each Ingress to trigger automatic certificate issuance.
    # Requires cert-manager installed in the cluster.
    certManager:
      enabled: false
      issuerName: "letsencrypt-production"
      issuerKind: "ClusterIssuer"   # ClusterIssuer (cluster-wide) or Issuer (namespace-scoped)
    # Override auto-generated TLS secret names.
    # Defaults: <tenantId>-ui-tls  and  <tenantId>-data-tls
    uiSecretName: ""
    dataSecretName: ""

  # ExternalDNS: automatically registers DNS records when Ingress resources are created.
  # Requires ExternalDNS deployed with access to your DNS provider.
  externalDns:
    enabled: false
    ttl: "60"

  # Optional per-service annotation overrides, merged on top of the common annotations above.
  # Useful for adding service-specific NGINX tuning (e.g. different timeouts per service).
  ui:
    annotations: {}
  data:
    annotations: {}

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC — ClusterRole + ClusterRoleBinding for the controller ServiceAccount.
# Grants the controller pod permission to run kubectl commands against the cluster:
# CRD definitions, TestRun/Generator instances, pods, services, PVCs, events.
rbac:
  create: true

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
