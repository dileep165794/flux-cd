{{- if .Values.controller.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cavisson-platform.fullname" . }}-controller-config-scripts
  labels:
    {{- include "cavisson-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
data:
  wait-for-mongodb.sh: |
    #!/bin/bash
    set -e
    
    echo "Waiting for MongoDB to be ready..."
    
    MAX_RETRIES=60
    RETRY_INTERVAL=5
    RETRY_COUNT=0
    
    until mongosh --host "${MONGO_HOST}" --port "${MONGO_PORT}" \
                  --username "${MONGO_ROOT_USER}" --password "${MONGO_ROOT_PASSWORD}" \
                  --authenticationDatabase admin \
                  --eval "db.adminCommand('ping')" --quiet > /dev/null 2>&1; do
      RETRY_COUNT=$((RETRY_COUNT + 1))
      if [ ${RETRY_COUNT} -eq ${MAX_RETRIES} ]; then
        echo "ERROR: MongoDB at ${MONGO_HOST}:${MONGO_PORT} is not ready after $(($MAX_RETRIES * $RETRY_INTERVAL)) seconds"
        exit 1
      fi
      echo "MongoDB not ready yet. Attempt ${RETRY_COUNT}/${MAX_RETRIES}. Retrying in ${RETRY_INTERVAL}s..."
      sleep ${RETRY_INTERVAL}
    done
    
    echo "MongoDB is ready at ${MONGO_HOST}:${MONGO_PORT}"

  create-mongodb-user.sh: |
    #!/bin/bash
    set -e
    
    echo "Creating MongoDB application user '${MONGO_APP_USER}'..."
    
    mongosh --host "${MONGO_HOST}" --port "${MONGO_PORT}" \
            --username "${MONGO_ROOT_USER}" --password "${MONGO_ROOT_PASSWORD}" \
            --authenticationDatabase admin \
            --quiet <<EOF
    
    // Check if user already exists    
    var user = null;
    try {
      user = db.getSiblingDB('admin').getUser('${MONGO_APP_USER}');
    } catch (e) {      
    }
    
    if (!user) {
      db.getSiblingDB('admin').createUser({
        user: '${MONGO_APP_USER}',
        pwd: '${MONGO_APP_PASSWORD}',
        roles: [
          { role: 'readWrite', db: 'config_db' },
          { role: 'dbAdmin', db: 'config_db' }
        ]
      });
      print('User ${MONGO_APP_USER} created successfully with readWrite and dbAdmin roles on config_db');
    } else {
      print('User ${MONGO_APP_USER} already exists, skipping creation');
    }
    
    EOF
    
    if [ $? -eq 0 ]; then
      echo "MongoDB user configuration completed successfully"
    else
      echo "ERROR: Failed to configure MongoDB user"
      exit 1
    fi

  configure-nosql-properties.sh: |
    #!/bin/bash
    set -e
    
    # The sys directory is mounted from PVC at /home/cavisson/work/webapps/sys
    NOSQL_CONFIG_FILE="/home/cavisson/work/webapps/sys/nosqlConfiguration.properties"
    
    echo "Configuring nosqlConfiguration.properties..."
    
    # Check if the file exists (should have been copied by copy-sys-directory init container)
    if [ ! -f "${NOSQL_CONFIG_FILE}" ]; then
      echo "ERROR: File ${NOSQL_CONFIG_FILE} does not exist on PVC"
      echo "The copy-sys-directory init container should have populated this"
      exit 1
    fi
    
    # Backup the original file if backup doesn't exist
    if [ ! -f "${NOSQL_CONFIG_FILE}.bak" ]; then
      cp "${NOSQL_CONFIG_FILE}" "${NOSQL_CONFIG_FILE}.bak"
      echo "Created backup: ${NOSQL_CONFIG_FILE}.bak"
    fi
    
    # Update the Host field from localhost to MongoDB service DNS name
    sed -i "s/^Host=.*/Host=${MONGO_HOST}/" "${NOSQL_CONFIG_FILE}"
    
    echo "Updated nosqlConfiguration.properties:"
    echo "  Host: ${MONGO_HOST}"
    echo "  Port: 27017 (unchanged)"
    echo "  UserName: cavisson (unchanged)"
    echo "  Password: Cavisson! (unchanged)"
    echo "  AuthDB: admin (unchanged)"
    echo "  DBType: MONGO (unchanged)"
    echo "  DBName: config_db (unchanged)"
    
    # Verify the change
    if grep -q "^Host=${MONGO_HOST}" "${NOSQL_CONFIG_FILE}"; then
      echo "Configuration file updated successfully"
    else
      echo "ERROR: Failed to update Host field in ${NOSQL_CONFIG_FILE}"
      exit 1
    fi

  configure-mongodb-services.sh: |
    #!/bin/bash
    set -e

    echo "Configuring service entries in MongoDB config_db.Service collection..."

    # Resolve cluster DNS hostnames to their actual IPs.
    # getent hosts uses the pod's /etc/resolv.conf (CoreDNS) for resolution.
    resolve_ip() {
      local host="$1"
      local ip
      ip=$(getent hosts "${host}" 2>/dev/null | awk '{ print $1; exit }')
      if [ -z "${ip}" ]; then
        echo "WARNING: Could not resolve IP for '${host}', falling back to hostname" >&2
        echo "${host}"
      else
        echo "${ip}"
      fi
    }

    REDIS_IP=$(resolve_ip "${REDIS_HOST}")
    POSTGRES_IP=$(resolve_ip "${POSTGRES_HOST}")

    echo "Resolved IPs:"
    echo "  Redis    ${REDIS_HOST} -> ${REDIS_IP}"
    echo "  Postgres ${POSTGRES_HOST} -> ${POSTGRES_IP}"

    mongosh --host "${MONGO_HOST}" --port "${MONGO_PORT}" \
            --username "${MONGO_APP_USER}" --password "${MONGO_APP_PASSWORD}" \
            --authenticationDatabase admin \
            --quiet <<EOF

    use config_db;

    // Configure Redis service entry
    print('Upserting Redis service configuration...');
    var redisResult = db.Service.updateOne(
      { name: 'redis' },
      {
        \$set: {
          controller: 'work',
          port: NumberLong('${REDIS_PORT}'),
          proto: 'http',
          ip: '${REDIS_IP}',
          name: 'redis',
          host: '${REDIS_HOST}'
        }
      },
      { upsert: true }
    );

    if (redisResult.modifiedCount > 0) {
      print('Redis service entry updated');
    } else if (redisResult.upsertedCount > 0) {
      print('Redis service entry created');
    } else {
      print('Redis service entry unchanged (already exists with same values)');
    }

    // Configure PostgreSQL service entry
    print('Upserting PostgreSQL service configuration...');
    var psqlResult = db.Service.updateOne(
      { name: 'psql' },
      {
        \$set: {
          controller: 'work',
          port: NumberLong('${POSTGRES_PORT}'),
          proto: 'http',
          ip: '${POSTGRES_IP}',
          name: 'psql',
          host: '${POSTGRES_HOST}',
          status: false,
          user: '${POSTGRES_USER}',
          pwd: '${POSTGRES_PASSWORD}'
        }
      },
      { upsert: true }
    );

    if (psqlResult.modifiedCount > 0) {
      print('PostgreSQL service entry updated');
    } else if (psqlResult.upsertedCount > 0) {
      print('PostgreSQL service entry created');
    } else {
      print('PostgreSQL service entry unchanged (already exists with same values)');
    }

    // Verify the entries
    print('');
    print('=== Current Service Entries ===');
    db.Service.find({ name: { \$in: ['redis', 'psql'] } }).forEach(function(doc) {
      printjson(doc);
    });

    EOF

    if [ $? -eq 0 ]; then
      echo "MongoDB service entries configured successfully"
    else
      echo "ERROR: Failed to configure service entries in MongoDB"
      exit 1
    fi

{{- end }}
