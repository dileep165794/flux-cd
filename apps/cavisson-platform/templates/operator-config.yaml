apiVersion: v1
kind: ConfigMap
metadata:
  name: cavisson-operator-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cavisson-operator-config
    app.kubernetes.io/part-of: cavisson-platform
    tenant-id: {{ .Values.tenantId }}
data:
  # Image configurations for operator-managed pods
  executionControllerImage: {{ .Values.operator.images.executionController | quote }}
  generatorImage: {{ .Values.operator.images.generator | quote }}
  
  # PVC configuration
  pvcName: {{ .Values.operator.pvcName | quote }}
  
  # Optional: Image pull policy
  imagePullPolicy: {{ .Values.operator.imagePullPolicy | default "IfNotPresent" | quote }}
  
  # Tenant ID
  tenantId: {{ .Values.tenantId | quote }}
