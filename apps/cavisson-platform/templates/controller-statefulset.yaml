{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cavisson-platform.fullname" . }}-controller
  labels:
    {{- include "cavisson-platform.controllerLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "cavisson-platform.fullname" . }}-controller
  replicas: {{ .Values.controller.replicaCount }}  
  selector:
    matchLabels:
      {{- include "cavisson-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cavisson-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cavisson-platform.serviceAccountName" . }}
      securityContext:
        # Below two settings were done to enforce volumenMount permission to cavisosn group. But it also has been taken care by initContainer. 
        fsGroup: 1001   # GID of cavisson user
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      # Copy sys directory from controller image to PVC (first run only)
      - name: copy-sys-directory
        image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Checking if sys directory needs to be copied to PVC..."
          
          # PVC is mounted at /mnt/pvc-sys, original files are at /home/cavisson/work/webapps/sys
          if [ -f "/mnt/pvc-sys/nosqlConfiguration.properties" ]; then
            echo "Sys directory already exists on PVC, skipping copy"
          else
            echo "Copying sys directory from image to PVC..."
            cp -r /home/cavisson/work/webapps/sys/* /mnt/pvc-sys/
            echo "Sys directory copied successfully"
            chown -R 1001:1001 /mnt/pvc-sys 
          fi

          # Copy workspace directory if not present already.
          if [ ! -z "$(ls -A /mnt/pvc-workspace 2>/dev/null)" ];then
            echo "workspace directory already exists on PVC, skipping copy"
          else 
            cp -r /home/cavisson/work/workspace/* /mnt/pvc-workspace/
            chown -R 1001:1001 /mnt/pvc-workspace 
            echo "workspace directory copied successfully"            
          fi 

          if [ ! -z "$(ls -A /mnt/pvc-etc 2>/dev/null)" ];then
            echo "workspace directory already exists on PVC, skipping copy"
          else 
            # Copying some selective files only. 
            echo "1000" >"/mnt/pvc-etc/test_suite_run_id"
            echo "1000" >"/mnt/pvc-etc/test_run_id"
            chown -R 1001:1001 /mnt/pvc-etc
            echo "test_run_id, test_suite_run_id are created."
          fi

          if [ ! -z "$(ls -A /mnt/pvc-logs 2>/dev/null)" ];then
            echo "workspace directory already exists on PVC, skipping permission change"
          else 
            cp -r /home/cavisson/work/logs/* /mnt/pvc-logs/
            chown -R 1001:1001 /mnt/pvc-logs
            echo "logs directory copied successfully"
          fi

        {{- if .Values.persistence.primary.enabled }}
        volumeMounts:
        - name: data
          mountPath: /mnt/pvc-sys
          subPath: sys
        - name: data
          mountPath: /mnt/pvc-etc
          subPath: etc
        - name: data
          mountPath: /mnt/pvc-workspace
          subPath: workspace
        - name: data
          mountPath: /mnt/pvc-logs
          subPath: logs
        {{- end }}
      # Wait for MongoDB to be ready before starting configuration
      - name: wait-for-mongodb
        image: "{{ .Values.controller.initContainer.image.repository }}:{{ .Values.controller.initContainer.image.tag }}"
        imagePullPolicy: {{ .Values.controller.initContainer.image.pullPolicy }}
        command: ["/bin/bash", "/scripts/wait-for-mongodb.sh"]
        env:
        - name: MONGO_HOST
          value: {{ include "cavisson-platform.fullname" . }}-mongo
        - name: MONGO_PORT
          value: "27017"
        - name: MONGO_ROOT_USER
          value: {{ .Values.mongo.rootUser | default "admin" | quote }}
        - name: MONGO_ROOT_PASSWORD
          value: {{ .Values.mongo.rootPassword | default "admin" | quote }}
        volumeMounts:
        - name: config-scripts
          mountPath: /scripts
      containers:
      - name: controller
        image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        securityContext:
          privileged: true
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: tomcat
          containerPort: 8009
          protocol: TCP
        - name: data-https
          containerPort: 443
          protocol: TCP
        - name: ui-https
          containerPort: 4444
          protocol: TCP
        env:
        - name: TENANT_ID
          value: {{ .Values.tenantId | quote }}
        - name: POSTGRES_HOST
          value: {{ include "cavisson-platform.fullname" . }}-postgres
        - name: POSTGRES_PORT
          value: "5432"
        - name: MONGO_HOST
          value: {{ include "cavisson-platform.fullname" . }}-mongo
        - name: MONGO_PORT
          value: "27017"
        - name: REDIS_HOST
          value: {{ include "cavisson-platform.fullname" . }}-redis
        - name: REDIS_PORT
          value: "6379"
        - name: MONGO_ROOT_USER
          value: {{ .Values.mongo.rootUser | default "admin" | quote }}
        - name: MONGO_ROOT_PASSWORD
          value: {{ .Values.mongo.rootPassword | default "admin" | quote }}
        - name: MONGO_APP_USER
          value: {{ .Values.controller.mongodb.appUser | default "cavisson" | quote }}
        - name: MONGO_APP_PASSWORD
          value: {{ .Values.controller.mongodb.appPassword | default "Cavisson!" | quote }}
        {{- with .Values.controller.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        {{- if .Values.persistence.primary.enabled }}
        - name: data
          mountPath: /home/cavisson/data_dir
          subPath: data_dir
        - name: data
          mountPath: /home/cavisson/work/webapps/logs/
          subPath: logs
        - name: data
          mountPath: /home/cavisson/work/workspace/
          subPath: workspace
        - name: data
          mountPath: /home/cavisson/etc/test_run_id
          subPath: etc/test_run_id
        - name: data  
          mountPath: /home/cavisson/etc/test_suite_run_id
          subPath: etc/test_suite_run_id
        - name: data
          mountPath: /home/cavisson/work/webapps/sys
          subPath: sys
        {{- end }}
        resources:
          {{- toYaml .Values.controller.resources | nindent 10 }}
      volumes:
      - name: config-scripts
        configMap:
          name: {{ include "cavisson-platform.fullname" . }}-controller-config-scripts
          defaultMode: 0755
      {{- if .Values.persistence.primary.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Values.persistence.primary.name }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
