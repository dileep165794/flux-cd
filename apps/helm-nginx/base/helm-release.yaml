apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: ingress-nginx

spec:
  interval: 5m

  chart:
    spec:
      chart: ingress-nginx
      version: "4.10.1"

      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: ingress-nginx-values
      valuesKey: values.yaml
