apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-dev

resources:
  - namespace.yaml
  - ../../base

patches:
  - path: replica-patch.yaml

images:
  - name: nginx
    newTag: 1.25

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: nginx-config
    literals:
      - ENV=dev
      - LOG_LEVEL=debug
