apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cavisson-platform
  namespace: cavisson-tenant1
spec:
  interval: 5m
  timeout: 25m

  install:
    createNamespace: true
    remediation:
      retries: 4

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: ./apps/cavisson-platform
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

  values:
    persistence:
      primary:
        storageClass: managed-csi
        accessMode: ReadWriteOnce

    mongo:
      persistence:
        enabled: true
        storageClass: managed-csi
        accessMode: ReadWriteOnce

    postgres:
      persistence:
        enabled: true
        storageClass: managed-csi
        accessMode: ReadWriteOnce

    redis:
      persistence:
        storageClass: managed-csi
